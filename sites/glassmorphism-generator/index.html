<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Glassmorphism Generator</title>
    <meta name="description" content="Generate beautiful glassmorphism CSS effects instantly. Tweak blur, transparency, and background colors to get the perfect frosted glass look.">
    <link rel="canonical" href="https://stacky.pages.dev/glassmorphism-generator/">
    <meta property="og:title" content="CSS Glassmorphism Generator"><meta property="og:type" content="website">
    <link rel="stylesheet" href="shared-styles.css"><link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ad-container ad-banner" id="ad-top"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="TOP_SLOT"></ins></div>
    <div class="container container-lg">
        <section class="hero mb-4"><h1>🪟 <span class="text-gradient">Glassmorphism</span> Generator</h1><p>Design beautiful frosted glass UI elements with pure CSS.</p></section>
        
        <div class="grid format-grid gap-8">
            <!-- Controls -->
            <div class="card flex-col">
                <h4 class="mb-4">Properties</h4>
                
                <div class="form-group mb-4">
                    <div class="flex justify-between text-sm mb-1"><label>Blur</label><span id="val-blur">10px</span></div>
                    <input type="range" id="blur" min="0" max="40" value="10" class="w-full" oninput="updateGlass()">
                </div>
                
                <div class="form-group mb-4">
                    <div class="flex justify-between text-sm mb-1"><label>Transparency</label><span id="val-opa">0.2</span></div>
                    <input type="range" id="opa" min="0" max="1" step="0.01" value="0.2" class="w-full" oninput="updateGlass()">
                </div>
                
                <div class="form-group mb-4">
                    <div class="flex justify-between text-sm mb-1"><label>Outline</label><span id="val-out">0.3</span></div>
                    <input type="range" id="out" min="0" max="1" step="0.01" value="0.3" class="w-full" oninput="updateGlass()">
                </div>
                
                <div class="form-group mb-4">
                    <div class="flex justify-between text-sm mb-1"><label>Glass Color</label></div>
                    <input type="color" id="glass-color" value="#ffffff" class="w-full h-10 border-none p-0 cursor-pointer" oninput="updateGlass()">
                </div>

                <div class="form-group mb-4">
                    <div class="flex justify-between text-sm mb-1"><label>Background Image (Preview)</label></div>
                    <select id="bg-image" class="input-text w-full text-sm" onchange="changeBg()">
                        <option value="gradient">Abstract Gradient</option>
                        <option value="https://images.unsplash.com/photo-1579546929518-9e396f3cc809">Colorful Mesh</option>
                        <option value="https://images.unsplash.com/photo-1557683311-eac922347aa1">Dark Galaxy</option>
                    </select>
                </div>
            </div>

            <!-- Preview -->
            <div class="card p-0 flex-col relative overflow-hidden h-full" id="preview-area" style="min-height:400px; background: linear-gradient(45deg, #ff00cc, #333399);">
                <div class="glass-orb orb-1"></div>
                <div class="glass-orb orb-2"></div>
                
                <div class="absolute inset-0 flex items-center justify-center p-8 z-10">
                    <div id="glass-box" class="p-8 rounded-xl shadow-2xl flex-col items-center justify-center text-center w-full max-w-sm transition-all" style="backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.3);">
                        <h2 class="mb-2" style="color:white; text-shadow: 0 2px 4px rgba(0,0,0,0.2)">Frosted Glass</h2>
                        <p style="color: rgba(255,255,255,0.8)">CSS only styling</p>
                    </div>
                </div>
            </div>
            
            <div class="card col-span-full">
                <div class="flex justify-between items-center mb-4">
                    <h4 class="m-0">CSS Code</h4>
                    <button class="btn btn-secondary py-1 text-sm" onclick="copyCSS()">📋 Copy CSS</button>
                </div>
                <pre class="bg-surface p-4 rounded-md overflow-x-auto border border-border"><code id="css-output" class="font-mono text-sm"></code></pre>
            </div>
        </div>
        
    </div>
    <div class="ad-container ad-banner" id="ad-bottom"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="BOTTOM_SLOT"></ins></div>
    <footer class="footer"><p>&copy; 2026 CSS Glassmorphism Generator.</p></footer>
    <script src="app.js"></script><script src="../../shared/theme-toggle.js"></script>
</body>
</html>
