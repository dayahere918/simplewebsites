name: CI/CD — Test, Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.changes.outputs.sites }}
      shared: ${{ steps.changes.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed sites
        id: changes
        run: |
          # All sites list for fallback
          ALL_SITES='["picker-wheel","festival-countdown","bill-splitter","emoji-translator","sleep-calculator","startup-idea-generator","loan-visualizer","height-comparison","color-palette-extractor","typing-speed-race","noise-meter","voice-to-text-counter","mood-board-generator","aws-cost-estimator","terraform-snippet-generator","cicd-visualizer","cloud-service-comparison","resume-ats-checker","face-shape-detector","baby-face-generator","pet-breed-identifier","awesome-free-tools","background-remover","pdf-toolkit","video-compressor","temp-mail","qr-code-generator","code-explainer","json-yaml-formatter","glassmorphism-generator","image-upscaler","seo-meta-generator","rank-everything"]'
          
          # Expand detection to include core infrastructure and workflows
          CORE_PATTERN='^(shared/|scripts/|package|jest.config.js|\.github/workflows/|terraform/|\.dockerignore|Dockerfile|docker-compose.yml)'
          
          if [ "${{ github.event_name }}" = "push" ]; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '^sites/' | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
            SHARED_COUNT=$(git diff --name-only HEAD~1 HEAD | grep -E "$CORE_PATTERN" -c || true)
          else
            CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD | grep '^sites/' | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
            SHARED_COUNT=$(git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD | grep -E "$CORE_PATTERN" -c || true)
          fi
          
          if [ "$SHARED_COUNT" -gt 0 ]; then
            echo "sites<<EOF" >> $GITHUB_OUTPUT
            echo "$ALL_SITES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "shared=1" >> $GITHUB_OUTPUT
          else
            echo "sites<<EOF" >> $GITHUB_OUTPUT
            echo "${CHANGED:-[]}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "shared=0" >> $GITHUB_OUTPUT
          fi

  test:
    needs: detect-changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests with coverage
        run: npm run test:ci

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: coverage/

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all sites
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  terraform:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.14.0'
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Terraform Import (Automated Migration)
        continue-on-error: true
        run: |
          for site in picker-wheel festival-countdown bill-splitter emoji-translator sleep-calculator startup-idea-generator loan-visualizer height-comparison color-palette-extractor typing-speed-race noise-meter voice-to-text-counter mood-board-generator aws-cost-estimator terraform-snippet-generator cicd-visualizer cloud-service-comparison resume-ats-checker face-shape-detector baby-face-generator pet-breed-identifier awesome-free-tools background-remover pdf-toolkit video-compressor temp-mail qr-code-generator code-explainer json-yaml-formatter glassmorphism-generator image-upscaler seo-meta-generator rank-everything; do
            terraform import "cloudflare_pages_project.sites[\"$site\"]" "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/$site" || echo "Project $site not found or already in state"
          done
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -detailed-exitcode -out=tfplan
          EXIT=$?
          set -e
          if [ "$EXIT" -eq 0 ]; then 
            echo "changes=false" >> $GITHUB_OUTPUT
          elif [ "$EXIT" -eq 2 ]; then 
            echo "changes=true" >> $GITHUB_OUTPUT
          else 
            exit $EXIT
          fi
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Terraform Apply
        if: steps.plan.outputs.changes == 'true'
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}


  deploy:
    needs: [build, terraform, detect-changes]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.detect-changes.outputs.sites != '[]'
    strategy:
      fail-fast: false
      matrix:
        site: ${{ fromJson(needs.detect-changes.outputs.sites) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Ensure project exists in Cloudflare
        continue-on-error: true
        run: |
          npx wrangler@3 pages project create ${{ matrix.site }} --production-branch main || echo "Project already exists or creation skipped"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/${{ matrix.site }} --project-name=${{ matrix.site }}
          wranglerVersion: '3'
